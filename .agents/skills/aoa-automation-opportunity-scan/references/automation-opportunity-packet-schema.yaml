packet_kind: AUTOMATION_OPPORTUNITY_PACKET
required_fields:
  - candidate_name
  - current_manual_route
  - repeat_signal
  - friction_signal
  - determinism_posture
  - input_clarity
  - output_clarity
  - proof_surface
  - reversibility
  - secret_coupling
  - approval_sensitivity
  - automation_mode_posture
  - verdict
  - checkpoint_required
  - owner_layer
  - evidence_refs
  - next_artifact
optional_fields:
  - schedule_hint
  - nearest_wrong_target
  - repair_reason
rules:
  - schedule_hint must remain advisory only
  - determinism_posture must name whether inputs and outputs are stable enough
  - secret_coupling must name whether hidden credentials or private data block automation
  - evidence_refs must justify the repeat signal and current manual route
  - automation_mode_posture must be conservative and must not imply hidden execution authority
  - checkpoint_required must be true for self-changing or approval-heavy routes
  - verdict must be seed_ready or not_now
