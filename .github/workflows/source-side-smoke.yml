name: Source-Side Smoke

on:
  schedule:
    - cron: "29 8 * * 2,7"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tiny-entry validator
        run: python scripts/validate_tiny_entry_route.py

      - name: Run KAG export validator
        run: python mechanics/boundary-bridge/parts/derived-kag-seam/scripts/validate_kag_export.py

      - name: Run tree-node contract validator
        run: python scripts/validate_tree_node_contracts.py

      - name: Run relation-pack validator
        run: python mechanics/relation-weaving/parts/graph-promotion/scripts/validate_tree_relation_pack.py

      - name: Run public example sync validator
        run: python mechanics/boundary-bridge/parts/public-mirror-sync/scripts/validate_tree_example_sync.py

      - name: Run tests
        run: python -m unittest discover -s tests
